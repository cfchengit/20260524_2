// 擷取 BIG-5 編碼的 CSV，回傳 {success, headers, rows}
async function fetchBig5CSV(url){
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const buf  = await resp.arrayBuffer();
  const text = new TextDecoder('big5').decode(buf);
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) throw new Error('空 CSV');
  const headers = parseCsvLine(lines[0]);
  const rows = lines.slice(1).map(l=>{
    const cols=parseCsvLine(l);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(cols[i]||'').trim());
    return obj;
  });
  return {success:true, headers, rows};
}

// 簡易 CSV 行解析（支援引號）
function parseCsvLine(line){
  const r=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur);
  return r;
}

// 解析校數 CSV → 填充 DIST_DATA 與 SCHOOL_ALL
// 欄位順序：項次,民國年,學制,校數/總計,國立,市立,私立,松山,信義,大安,中山,中正,大同,萬華,文山,南港,內湖,士林,北投
function parseSchoolsCSV(rows){
  const DIST_ORDER=['松山','信義','大安','中山','中正','大同','萬華','文山','南港','內湖','士林','北投'];
  const distMap={};
  DIST_ORDER.forEach(d=>distMap[d]={name:d,kinder:0,elem:0,junior:0,senior:0,special:0,total:0});
  const totals={kinder:0,elem:0,senior:0,junior:0,special:0};
  let dataYear=0;

  rows.forEach(row=>{
    const cols=Object.values(row);
    if(cols.length<8) return;
    dataYear=parseInt(cols[1])||dataYear;
    const typeStr=String(cols[2]||'');
    let key='';
    if(typeStr.includes('幼'))                     key='kinder';
    else if(typeStr.includes('小')&&!typeStr.includes('中')) key='elem';
    else if(typeStr.includes('國中')||typeStr.includes('中學')) key='junior';
    else if(typeStr.includes('高')||typeStr.includes('中等'))   key='senior';
    else if(typeStr.includes('特'))                 key='special';
    if(!key) return;
    totals[key]=parseInt(cols[3])||0;
    DIST_ORDER.forEach((d,di)=>{
      distMap[d][key]=parseInt(cols[7+di])||0;
    });
  });

  // 組合並排序（按 total 降序）
  DIST_DATA=DIST_ORDER.map(d=>{
    const dd=distMap[d];
    dd.total=dd.kinder+dd.elem+dd.junior+dd.senior+dd.special;
    return dd;
  }).sort((a,b)=>b.total-a.total);

  DIST_MAX=Math.max(...DIST_DATA.map(d=>d.total),1);
  // SCHOOL_ALL 順序對應 SCHOOL_META 順序
  SCHOOL_ALL=[totals.kinder,totals.elem,totals.senior,totals.junior,totals.special];
  return dataYear;
}

// 解析學生數 CSV → [{year,total,g:[6]}]
// 欄位順序：項次,學年度,國小總計,一年級,...,六年級
function parseStudentCSV(rows){
  return rows.map(row=>{
    const cols=Object.values(row);
    if(cols.length<8) return null;
    const year=parseInt(cols[1])||0;
    if(!year) return null;
    return{year, total:parseInt(cols[2])||0,
      g:[cols[3],cols[4],cols[5],cols[6],cols[7],cols[8]].map(v=>parseInt(v)||0)};
  }).filter(Boolean).sort((a,b)=>a.year-b.year);
}

// 解析班級數 CSV → [{year,senior,junior,elem}]
// 欄位順序：項次,民國年,高級中等學校,國民中學,國民小學
function parseClassCSV(rows){
  return rows.map(row=>{
    const cols=Object.values(row);
    if(cols.length<4) return null;
    const year=parseInt(cols[1])||0;
    if(!year) return null;
    return{year, senior:parseInt(cols[2])||0, junior:parseInt(cols[3])||0, elem:parseInt(cols[4])||0};
  }).filter(Boolean).sort((a,b)=>a.year-b.year);
}

function buildButtons(){
  yearBtns=[]; cmpBtns=[];
  const years=STUDENT_DATA.map(d=>d.year);
  const bw=Math.min(52,Math.floor((width-80)/(years.length*1.12)));
  const bGap=Math.floor(bw*0.1);
  const tw=years.length*(bw+bGap)-bGap;
  let sx=(width-tw)/2;
  years.forEach((y,i)=>{
    yearBtns.push({x:sx+i*(bw+bGap),y:Y0.yearStart+4,w:bw,h:28,year:y});
    cmpBtns.push({x:sx+i*(bw+bGap),y:Y0.yearStart+40,w:bw,h:24,year:y});
  });
  tabBtns=[];
  ['🏫 學校分佈','📈 學生趨勢','📚 班級統計'].forEach((lbl,i)=>
    tabBtns.push({x:30+i*155,y:Y0.tabStart+1,w:148,h:34,label:lbl}));
  distChips=[];
  DIST_DATA.forEach((d,i)=>{
    const col=i%6,row=Math.floor(i/6);
    distChips.push({x:col*92,y:row*28,w:86,h:24,idx:i,name:d.name});
  });
}

    classNormCT=[cc.senior/mxc,cc.junior/mxc,cc.elem/mxc];
  }else{gradeNormCT=new Array(6).fill(0);classNormCT=new Array(3).fill(0);}

  const maxC=Math.max(cd.senior,cd.junior,cd.elem);
  classNormT=[cd.senior/maxC,cd.junior/maxC,cd.elem/maxC];
  lineDrawPct=0; lineDrawPctT=1;
}
function updateSchoolFilter(){
  const cnts=[0,0,0,0,0];
  selDistSet.forEach(i=>{
    cnts[0]+=DIST_DATA[i].kinder; cnts[1]+=DIST_DATA[i].elem;
    cnts[2]+=DIST_DATA[i].senior; cnts[3]+=DIST_DATA[i].junior;
    cnts[4]+=DIST_DATA[i].special;
  });
  filteredCnts=[...cnts];
  const mx=Math.max(...cnts,1);
  schoolNormT=cnts.map(c=>c/mx);
}

// ══════════════════════════════════════════════════════
// 動畫更新
// ══════════════════════════════════════════════════════
function updateAnims(){
  const e=0.07;
  for(const k in kpiA) kpiA[k]+=(kpiT[k]-kpiA[k])*e;
  lineDrawPct+=(lineDrawPctT-lineDrawPct)*0.04;
  flashAlpha=Math.max(0,flashAlpha-5);
  for(let i=0;i<5;i++) schoolNorm[i]+=(schoolNormT[i]-schoolNorm[i])*e;
  DIST_DATA.forEach((_,i)=>{
    if(i<distNorm.length) distNorm[i]+=(distNormT[i]-distNorm[i])*e;
    if(i<distAlpha.length) distAlpha[i]+=(distAlphaT[i]-distAlpha[i])*0.09;
  });
  for(let i=0;i<6;i++){
    gradeNorm[i]+=(gradeNormT[i]-gradeNorm[i])*e;
    gradeNormC[i]+=(gradeNormCT[i]-gradeNormC[i])*e;
  }
  for(let i=0;i<3;i++){
    classNorm[i]+=(classNormT[i]-classNorm[i])*e;
    classNormC[i]+=(classNormCT[i]-classNormC[i])*e;
  }
  bgParts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life+=p.speed;
    if(p.life>1)p.life=0;
    if(p.x<0)p.x=width; if(p.x>width)p.x=0;
    if(p.y<0)p.y=height; if(p.y>height)p.y=0;
  });
  clickFx=clickFx.filter(p=>p.a>4);
  clickFx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.94;p.vy*=0.94;p.a-=7;p.r*=0.97;});
}

// ══════════════════════════════════════════════════════
// 手勢辨識
// ══════════════════════════════════════════════════════
function processGesture(){
  if(!gestureEnabled){fingerX=-1;fingerY=-1;isPinching=false;pinchApproaching=false;pinchLockX=-1;pinchLockY=-1;return;}
  if(!gestureReady||hands.length===0){pinchDebounce=Math.max(0,pinchDebounce-1);return;}
  let hand=hands[0];
  if(hands.length>1) hand=hands.reduce((b,h)=>h.keypoints[8].x>b.keypoints[8].x?h:b);
  const idx=hand.keypoints[8], thm=hand.keypoints[4];
  const rawX=map(idx.x,0,camW,0,width), rawY=map(idx.y,0,camH,0,height);
  const dx=idx.x-thm.x, dy=idx.y-thm.y;
  pinchDist=Math.sqrt(dx*dx+dy*dy);
  const PRE=65, ACT=38;
  if(pinchDist<PRE&&!pinchApproaching&&!isPinching){pinchApproaching=true;pinchLockX=rawX;pinchLockY=rawY;}
  if(pinchDist>=PRE){pinchApproaching=false;pinchLockX=-1;pinchLockY=-1;}
  fingerX=(pinchApproaching||isPinching)&&pinchLockX>=0?pinchLockX:rawX;
  fingerY=(pinchApproaching||isPinching)&&pinchLockY>=0?pinchLockY:rawY;
  updateHoverState(fingerX,fingerY);
  wasPinching=isPinching; isPinching=pinchDist<ACT;
  if(isPinching&&!wasPinching&&pinchDebounce<=0){
    const cx=pinchLockX>=0?pinchLockX:fingerX, cy=pinchLockY>=0?pinchLockY:fingerY;
    handleClick(cx,cy); pinchDebounce=50; addClickFx(cx,cy,[200,50,50]);
  }
  if(pinchDebounce>0) pinchDebounce--;
}

// ══════════════════════════════════════════════════════
// 互動（滑鼠 ＆ 手勢共用）
// ══════════════════════════════════════════════════════
function updateHoverState(x,y){
  hoverYearIdx=-1;hoverCmpIdx=-1;hoverTabIdx=-1;hoverDistIdx=-1;
  yearBtns.forEach((b,i)=>{if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)hoverYearIdx=i;});
  cmpBtns.forEach((b,i)=>{if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)hoverCmpIdx=i;});
  tabBtns.forEach((b,i)=>{if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)hoverTabIdx=i;});
  if(activeTab===0) distChips.forEach((ch,i)=>{
    const cx=30+ch.x,cy=Y0.chartStart+22+ch.y;
    if(x>=cx&&x<=cx+ch.w&&y>=cy&&y<=cy+ch.h)hoverDistIdx=i;
  });
}
function handleClick(x,y){
  const gb=gestureBtnRect;
  if(x>=gb.x&&x<=gb.x+gb.w&&y>=gb.y&&y<=gb.y+gb.h){
    gestureEnabled=!gestureEnabled;
    if(!gestureEnabled){fingerX=-1;fingerY=-1;isPinching=false;wasPinching=false;pinchApproaching=false;pinchLockX=-1;pinchLockY=-1;}
    flashAlpha=20; addClickFx(gb.x+gb.w/2,gb.y+gb.h/2,gestureEnabled?C.teal:C.coral); return;
  }
  yearBtns.forEach(b=>{
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h&&b.year!==selectedYear){
      selectedYear=b.year;flashAlpha=30;setTargets();addClickFx(b.x+b.w/2,b.y+b.h/2,C.teal);
    }
  });
  cmpBtns.forEach(b=>{
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){
      compareYear=(b.year===compareYear)?null:b.year;flashAlpha=22;setTargets();addClickFx(b.x+b.w/2,b.y+b.h/2,C.amber);
    }
  });
  tabBtns.forEach((b,i)=>{
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h&&i!==activeTab){
      activeTab=i;flashAlpha=22;lineDrawPct=0;lineDrawPctT=1;
    }
  });
  if(activeTab===0){
    distChips.forEach(ch=>{
      const cx=30+ch.x,cy=Y0.chartStart+22+ch.y;
      if(x>=cx&&x<=cx+ch.w&&y>=cy&&y<=cy+ch.h){
        if(selDistSet.has(ch.idx)){selDistSet.delete(ch.idx);distAlphaT[ch.idx]=0.15;}
        else{selDistSet.add(ch.idx);distAlphaT[ch.idx]=1.0;}
        updateSchoolFilter();addClickFx(cx+ch.w/2,cy+ch.h/2,C.teal);
      }
    });
    const _oy=4,allY=Y0.chartStart+_oy+1,allX=30+72;
    if(x>=allX&&x<=allX+38&&y>=allY&&y<=allY+15){
      DIST_DATA.forEach((_,i)=>{selDistSet.add(i);distAlphaT[i]=1.0;});
      updateSchoolFilter();addClickFx(allX+19,allY+8,C.teal);
    }
    const clrX=allX+44;
    if(x>=clrX&&x<=clrX+38&&y>=allY&&y<=allY+15){
      selDistSet.clear();DIST_DATA.forEach((_,i)=>{distAlphaT[i]=0.15;});
      updateSchoolFilter();addClickFx(clrX+19,allY+8,C.coral);
    }
  }
}

  const prog=pinch?1:appr?constrain(map(pinchDist,65,38,0,1),0,1):0;

  fill(200,50,50,lerp(130,220,prog));circle(fingerX,fingerY,lerp(26,20,prog));
  fill(255);circle(fingerX,fingerY,lerp(10,8,prog));
  if(appr||pinch){
    const rr=lerp(44,20,prog);
    stroke(200,50,50,lerp(120,220,prog));strokeWeight(lerp(1.5,3,prog));noFill();circle(fingerX,fingerY,rr*2);
    stroke(200,50,50,200);strokeWeight(3);arc(fingerX,fingerY,rr*2+10,rr*2+10,-HALF_PI,-HALF_PI+lerp(0,TWO_PI,prog));noStroke();
  }
  if(pinch){
    stroke(200,50,50,190);strokeWeight(2.5);noFill();circle(fingerX,fingerY,55+Math.sin(frameCount*0.3)*7);noStroke();
    fill(200,50,50,215);rect(fingerX-22,fingerY-46,44,17,4);
    fill(255);textFont('Oxanium');textSize(9);textStyle(BOLD);textAlign(CENTER);text('CLICK',fingerX,fingerY-34);textAlign(LEFT);textStyle(NORMAL);
  }
  if(appr){
    fill(200,50,50,lerp(0,185,prog));rect(fingerX-30,fingerY-46,60,17,4);
    fill(255);textFont('Noto Sans TC');textSize(9);textStyle(BOLD);textAlign(CENTER);text('準備點擊',fingerX,fingerY-34);textAlign(LEFT);textStyle(NORMAL);
  }
  const cs=norm?11:lerp(11,5,prog),gap=norm?6:lerp(6,4,prog);

  const clsDef=[{label:'高中職',raw:cd.senior,c:C.coral},{label:'國民中學',raw:cd.junior,c:C.blue},{label:'國民小學',raw:cd.elem,c:C.teal}];
  const cbW=(rw-40)/3-10,cbBase=availH*0.73,cbMaxH=availH*0.54;
  clsDef.forEach((cl,i)=>{
    const x=rx+i*(cbW+12),h=classNorm[i]*cbMaxH;
    if(cc){
      const gh=classNormC[i]*cbMaxH;
      stroke(...C.amber,160);strokeWeight(1.5);drawingContext.setLineDash([3,3]);noFill();rect(x,cbBase-gh,cbW,gh,5,5,0,0);drawingContext.setLineDash([]);noStroke();
      const cmpR=[cc.senior,cc.junior,cc.elem][i],delta=cl.raw-cmpR;
      textFont('Oxanium');textSize(10);textStyle(BOLD);fill(delta>=0?[...C.teal]:[...C.coral]);textAlign(CENTER);
      text((delta>=0?'+':'')+delta,x+cbW/2,cbBase-Math.max(h,gh)-12);textStyle(NORMAL);
    }else if(yi>0){
      const prev=CLASS_DATA[yi-1],pa=[prev.senior,prev.junior,prev.elem],d=cl.raw-pa[i];
      textFont('Oxanium');textSize(10);textStyle(BOLD);fill(d>=0?[...C.teal]:[...C.coral]);textAlign(CENTER);
      text((d>=0?'▲ ':' ▼')+Math.abs(d),x+cbW/2,cbBase-h-12);textStyle(NORMAL);
    }
    noStroke();fill(...cl.c,15);rect(x-3,cbBase-h-3,cbW+6,h+6,7);
    fill(...cl.c,220);rect(x,cbBase-h,cbW,h,5,5,0,0);fill(255,255,255,40);rect(x,cbBase-h,cbW,min(8,h),5,5,0,0);
    textFont('Oxanium');textSize(15);textStyle(BOLD);fill(...cl.c);textAlign(CENTER);text(cl.raw.toLocaleString(),x+cbW/2,cbBase+17);
    textFont('Noto Sans TC');textSize(10);textStyle(NORMAL);fill(...C.txt2);text(cl.label,x+cbW/2,cbBase+30);textAlign(LEFT);
    barHits.push({x,y:cbBase-h-3,w:cbW,h:h+3,
      lines:[cl.label,selectedYear+'：'+cl.raw.toLocaleString()+' 班',cc?compareYear+'：'+[cc.senior,cc.junior,cc.elem][i].toLocaleString()+' 班':'']});
  });
  stroke(200,212,228);strokeWeight(1);line(rx,cbBase,rx+rw,cbBase);noStroke();
  textFont('Noto Sans TC');textSize(10);fill(...C.txt3);text('三級合計：',rx,availH*0.85);
  textFont('Oxanium');textSize(13);textStyle(BOLD);fill(...C.teal);
  text((cd.senior+cd.junior+cd.elem).toLocaleString()+' 班',rx+55,availH*0.85);textStyle(NORMAL);
}

/* ════════════════════════════════════════════════════
   滑鼠事件
════════════════════════════════════════════════════ */
function mouseMoved(){updateHoverState(mouseX,mouseY);cursor(hoverYearIdx>=0||hoverCmpIdx>=0||hoverTabIdx>=0||hoverDistIdx>=0?HAND:ARROW);}
function mousePressed(){handleClick(mouseX,mouseY);}
function windowResized(){resizeCanvas(windowWidth,windowHeight);buildButtons();}

</script>
